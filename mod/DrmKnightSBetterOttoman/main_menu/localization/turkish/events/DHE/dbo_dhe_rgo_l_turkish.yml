 dbo_dhe_rgo.51.desc: "[ShowProvinceDefinitionName('kayseri_province')] [Concept('province', 'vilayetinde ki')|e] bazı [locations|e] [ShowGoodsName('potato')] yetiştiriciliği için uygun bir bölgedir. [ROOT.GetCountry.GetName] olarak, bu bölgeyi [ShowGoodsName('potato')] üretimi için kullanabiliriz. [ShowProvinceDefinitionName('kayseri_province')] bölgesinde [ShowGoodsName('potato')] yetiştiriciliği yaparak, ekonomimizi güçlendirebilir ve halkımızın refahını artırabiliriz."
