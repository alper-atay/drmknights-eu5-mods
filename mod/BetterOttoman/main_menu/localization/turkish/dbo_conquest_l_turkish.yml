 # Policies Desc
 dbo_conquest_stamp_anatolian_turks_policy_desc: "$dbo_conquest_anatolian_brief$\n\n$dbo_conquest_anatolian_turks$ başarıyla sağlandı ve artık daha güçlüyüz. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_anatolian_turks_map_info$ ele geçirdik!"
 dbo_conquest_stamp_rumelia_policy_desc: "$dbo_conquest_rumelia_brief$\n\n$dbo_conquest_rumelia$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('balkan_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_rumelia_map_info$ ele geçirdik!"
 dbo_conquest_stamp_fertile_crescent_policy_desc: "$dbo_conquest_fertile_crescent_brief$\n\n$dbo_conquest_fertile_crescent$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('crescent_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_fertile_crescent_map_info$ ele geçirdik!"
 dbo_conquest_stamp_arabian_peninsula_policy_desc: "$dbo_conquest_arabian_peninsula_brief$\n\n$dbo_conquest_arabian_peninsula$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('arabia_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_arabian_peninsula_map_info$ ele geçirdik!"
 dbo_conquest_stamp_black_sea_policy_desc: "$dbo_conquest_black_sea_brief$\n\n$dbo_conquest_black_sea$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowAreaName('black_sea_area')] kıyısı olan [Concept('provinces','Vilayetlere')|e] hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_black_sea_map_info$ ele geçirdik!"
 dbo_conquest_stamp_nile_river_policy_desc: "$dbo_conquest_nile_river_brief$\n\n$dbo_conquest_nile_river$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('egypt_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_nile_river_map_info$ ele geçirdik!"
 dbo_conquest_stamp_europe_eastern_gate_policy_desc: "$dbo_conquest_europe_eastern_gate_brief$\n\n$dbo_conquest_europe_eastern_gate$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('carpathia_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_europe_eastern_gate_map_info$ ele geçirdik!"
 dbo_conquest_stamp_turkish_renaissance_policy_desc: "$dbo_conquest_turkish_renaissance_brief$\n\n$dbo_conquest_turkish_renaissance$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('italy_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_turkish_renaissance_map_info$ ele geçirdik!"
 dbo_conquest_stamp_pearl_of_east_policy_desc: "$dbo_conquest_pearl_of_east_brief$\n\n$dbo_conquest_pearl_of_east$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('persia_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_pearl_of_east_map_info$ ele geçirdik!"
 dbo_conquest_stamp_maghreb_policy_desc: "$dbo_conquest_maghreb_brief$\n\n$dbo_conquest_maghreb$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('maghreb_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_maghreb_map_info$ ele geçirdik!"
 dbo_conquest_stamp_steep_mountain_policy_desc: "$dbo_conquest_steep_mountain_brief$\n\n$dbo_conquest_steep_mountain$ başarıyla sağlandı ve artık daha güçlüyüz. Bütün [ShowRegionName('caucasus_region')] bölgesine hâkimiyet sağladık. Tüm [ShowCultureGroupName('turkic_group')] halkı olarak bu topraklara kök salacağız!\n\n$dbo_conquest_steep_mountain_map_info$ ele geçirdik!"
