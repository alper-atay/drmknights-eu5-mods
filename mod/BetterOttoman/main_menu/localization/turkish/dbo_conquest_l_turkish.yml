# Laws Desc
 dbo_conquest_stamp_anatolian_turks_law_desc: "$dbo_conquest_anatolian_turks$ yasası, Anadolu'daki Türk siyasi birliğini pekiştirmek için oluşturulmuştur."
 dbo_conquest_stamp_rumelia_law_desc: "$dbo_conquest_rumelia$ yasası, Rumeli'deki Osmanlı hâkimiyetini güçlendirmek için oluşturulmuştur."
 dbo_conquest_stamp_fertile_crescent_law_desc: "$dbo_conquest_fertile_crescent$ yasası, Bereketli Hilâl'deki Osmanlı etkisini artırmak için oluşturulmuştur."
 dbo_conquest_stamp_arabian_peninsula_law_desc: "$dbo_conquest_arabian_peninsula$ yasası, Arap Yarımadası'ndaki Osmanlı hâkimiyetini pekiştirmek için oluşturulmuştur."
 dbo_conquest_stamp_black_sea_law_desc: "$dbo_conquest_black_sea$ yasası, Karadeniz'deki Osmanlı denizcilik gücünü artırmak için oluşturulmuştur."
 dbo_conquest_stamp_nile_river_law_desc: "$dbo_conquest_nile_river$ yasası, Mısır'daki Osmanlı hâkimiyetini güçlendirmek için oluşturulmuştur."
 dbo_conquest_stamp_europe_eastern_gate_law_desc: "$dbo_conquest_europe_eastern_gate$ yasası, Karpatlar'daki Osmanlı etkisini artırmak için oluşturulmuştur."
 dbo_conquest_stamp_turkish_renaissance_law_desc: "$dbo_conquest_turkish_renaissance$ yasası, Türk renesansını desteklemek için oluşturulmuştur."
 dbo_conquest_stamp_pearl_of_east_law_desc: "$dbo_conquest_pearl_of_east$ yasası, Doğu'nun incisi olan bu bölgeyi kontrol altına almak için oluşturulmuştur."
 dbo_conquest_stamp_maghreb_law_desc: "$dbo_conquest_maghreb$ yasası, Mağrip'teki Osmanlı hâkimiyetini pekiştirmek için oluşturulmuştur."
 dbo_conquest_stamp_steep_mountain_law_desc: "$dbo_conquest_steep_mountain$ yasası, Kafkasya'daki Osmanlı etkisini artırmak için oluşturulmuştur."
