l_turkish:
 dbo_sahni_seman_madrasa: "Sahn-ı Seman Medresesi"
 dbo_sahni_seman_madrasa_desc: "Sahn-ı Seman, Fatih Sultan Mehmed'in İstanbul'u fethinden sonra kurduğu eğitim kurumları arasında en üst düzeyde eğitim veren yükseköğrenim kurumudur. Sahn-ı Seman; Kur'an, hadis, kelâm, fıkıh, tefsir gibi İslam bilimlerinin yanı sıra fizik, kimya, matematik, astronomi gibi aklî bilimlerde dersler verirdi. Fatih Külliyesi içerisinde yer alan Sahn-ı Seman, külliye bütünlüğü içerisinde yapılmıştır. İnşaatı 1462 ile 1470 yılları arasında sürmüştür."
 dbo_sahni_seman_madrasa_maintenance: "$dbo_sahni_seman_madrasa$"
 dbo_watchhouse: "Karakol"
 dbo_watchhouse_desc: "Asayişi sağlamak, sınırları korumak ve haberleşme ağını denetlemek amacıyla stratejik noktalara inşa edilen askerî karakollardır."
 dbo_watchhouse_maintenance: "$dbo_watchhouse$"
 dbo_grand_mosque: "Ulu Cami"
 dbo_grand_mosque_desc: "İslam mimarisinin en görkemli örneklerinden biri olan Ulu Cami, şehrin manevi merkezidir. Cemaatin bir araya geldiği, ilim ve ibadetin harmanlandığı bu kutsal yapı, devletin ihtişamını ve inancın gücünü simgeler."
 dbo_grand_mosque_maintenance: "$dbo_grand_mosque$"
 dbo_beylerbeyi: "Beylerbeyliği"
 dbo_beylerbeyi_desc: "Osmanlı İmparatorluğu'nda bir eyaletin veya bölgenin en yüksek yöneticisi olan Beylerbeyi, hem askeri hem de sivil otoriteye sahip önemli bir makamdır. Beylerbeyi, padişahın temsilcisi olarak görev yapar, bölgesel yönetimi sağlar ve gerektiğinde askeri liderlik yapar."
 dbo_beylerbeyi_maintenance: "$dbo_beylerbeyi$"
 dbo_otag: "Otağ"
 dbo_otag_desc: "Han'ın seferlerde veya törenlerde kullandığı, devletin gücünü ve hükümdarın otoritesini temsil eden görkemli saltanat çadırıdır. Savaş meydanında ordunun yönetim merkezi, barışta ise devletin ihtişamlı bir simgesidir. Otağ, Tengri inancında gökyüzünün ve göksel düzenin sembolüdür, bu nedenle hükümdarın gücünü ve ilahi hakkını vurgular."
 dbo_otag_maintenance: "$dbo_otag$"
 dbo_ulu_otag: "Ulu Otağ"
 dbo_ulu_otag_desc: "Ulu Otağ, Tengri inancında gökyüzünün ve göksel düzenin sembolü olan görkemli bir saltanat çadırıdır. Hükümdarın gücünü ve ilahi hakkını vurgulayan Ulu Otağ, savaş meydanında ordunun yönetim merkezi, barışta ise devletin ihtişamlı bir simgesidir."
 dbo_ulu_otag_maintenance: "$dbo_ulu_otag$"
 dbo_mosque: "Cami"
 dbo_mosque_desc: "Cami, İslam toplumlarında ibadet ve toplumsal etkinliklerin merkezi olan kutsal bir yapıdır. Minareleri, kubbeleri ve geniş avlusu ile dikkat çeken camiler, Müslümanların günlük ibadetlerini gerçekleştirdiği, cuma namazlarının kılındığı ve dini eğitimlerin verildiği önemli mekanlardır."
 dbo_mosque_maintenance: "$dbo_mosque$"