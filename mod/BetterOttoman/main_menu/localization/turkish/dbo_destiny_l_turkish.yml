l_turkish:
# dbo_destiny_cultural_capital_constantinople
 dbo_destiny_cultural_capital_constantinople: "Kültür Başkenti: [ShowLocationName('constantinople')]"
 dbo_destiny_cultural_capital_constantinople_desc: "[ShowLocationName('constantinople')], İmparatorluğumuzun kalbinde, kültürümüzün ve sanatımızın en parlak örneklerinin sergilendiği bir şehir yükseliyor. Bu şehir, sadece Osmanlı'nın değil, tüm dünyanın dikkatini çekecek bir kültürel başkent olacak. Sanatçılar, yazarlar ve düşünürler burada toplanacak, eserlerini yaratacak ve mirasımızı gelecek nesillere aktaracaklar. Bu büyük tasarıyı destekleyerek, Osmanlı'nın kültürel zenginliğini ve gücünü tüm dünyaya göstereceğiz."
 dbo_destiny_cultural_capital_constantinople_can_end_tt: "[ShowGovernmentReformName('dbo_destiny_cultural_capital_constantinople')] [Concept('government_reform', 'Hükûmet Islahatı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_cultural_capital_constantinople_check', SituationView.GetPlayer.MakeScope.Self)]"
# dbo_destiny_legacy_of_seljuks
 dbo_destiny_legacy_of_seljuks: "Ebedi Selçuklu Ruhu"
 dbo_destiny_legacy_of_seljuks_desc: "Selçuklu mirasını benimsemek, Osmanlıların kültürel çeşitliliğini ve yönetim becerilerini artırdı. Selçuklu etkisi, Osmanlıların mimarisinde, sanatında ve yönetiminde belirgin bir şekilde görülmektedir. Selçuklu mirasını kabul etmek, Osmanlıların bölgedeki hakimiyetini pekiştirdi ve onların uzun ömürlü bir imparatorluk olmalarına katkıda bulundu."
 dbo_destiny_legacy_of_seljuks_can_end_tt: "[ShowGovernmentReformName('dbo_destiny_legacy_of_seljuks')] [Concept('government_reform', 'Hükûmet Islahatı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_legacy_of_seljuks_check', SituationView.GetPlayer.MakeScope.Self)]"
# dbo_destiny_ottoman_empire
 dbo_destiny_ottoman_empire: "Osmanlı İmparatorluğu"
 dbo_destiny_ottoman_empire_desc: "Osmanlı İmparatorluğu, disiplinli ordusu, gelişmiş idari sistemi ve stratejik ticaret merkezleri üzerindeki hâkimiyeti sayesinde hızla genişleyebilen bir devlettir. Tımar sistemi güçlü bir askerî yapı sağlarken, farklı din ve topluluklara tanınan özerklik iç istikrarı artırır. İstanbul’un fethiyle imparatorluk statüsü kazanır ve Doğu ile Batı arasında benzersiz bir güç odağı hâline gelir."
 dbo_destiny_ottoman_empire_can_end_tt: "[ShowGovernmentReformName('dbo_destiny_ottoman_empire')] [Concept('government_reform', 'Hükûmet Islahatı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_ottoman_empire_check', SituationView.GetPlayer.MakeScope.Self)]"
# dbo_destiny_piri_reis
 dbo_destiny_piri_reis: "Pîrî Reis"
 dbo_destiny_piri_reis_desc: "Pîrî Reis, Osmanlı İmparatorluğu'nun denizcilik ve haritacılık alanındaki en parlak figürlerinden biridir. Onun detaylı haritaları ve denizcilik bilgisi, Osmanlıların Akdeniz ve ötesindeki deniz seferlerinde büyük avantaj sağlamıştır. Pîrî Reis'in çalışmaları, Osmanlı deniz gücünün temel taşlarından biri olarak kabul edilir ve imparatorluğun denizlerdeki hakimiyetini pekiştirmiştir. Türk denizci, amiral ve haritacıdır. Kitab-ı Bahriye adlı eseri Akdeniz kıyılarını ayrıntılı biçimde tanımlar. 1513 tarihli dünya haritası, Amerika kıtası hakkında dönemin en erken ve en değerli bilgilerini içermesiyle dikkat çeker. Denizcilik bilgisi, keşif ruhu ve bilimsel yaklaşımıyla Osmanlı deniz gücünün simge isimlerinden biri olmuştur."
 dbo_destiny_piri_reis_can_end_tt: "[ShowGovernmentReformName('dbo_destiny_piri_reis')] [Concept('government_reform', 'Hükûmet Islahatı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_piri_reis_check', SituationView.GetPlayer.MakeScope.Self)]"
# dbo_destiny_mentor_lala
 dbo_destiny_mentor_lala: "Akıl Hocası Lalalar"
 dbo_destiny_mentor_lala_desc: "Osmanlı İmparatorluğu'nda 'devletin yaşayan hafızası' olarak nitelendirilebilecek Lalalar, bir şehzadenin sancağa çıkışından itibaren onun hem askeri hem de idari zekasını şekillendiren en kritik akıl hocalarıdır. Tecrübeli devlet adamları veya komutanlar arasından özenle seçilen bu figürler, geleceğin sultanına sadece diplomasi ve savaş stratejisi öğretmekle kalmaz; aynı zamanda ona devletin etik değerlerini, adalet anlayışını ve halkla kuracağı bağın inceliklerini aşılayan birer manevi rehber rolü üstlenirler. Bir şehzadenin tahta geçtiğinde sergilediği yetkinliğin arkasındaki gizli mimarlar olan lalalar, tarihin akışını değiştiren liderlerin yetişmesini sağlayarak imparatorluk mekanizmasının liyakat temelli sürekliliğini teminat altına alan sarsılmaz birer sütun görevi görmüşlerdir."
 dbo_destiny_mentor_lala_can_end_tt: "[ShowGovernmentReformName('dbo_destiny_mentor_lala')] [Concept('government_reform', 'Hükûmet Islahatı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_mentor_lala_check', SituationView.GetPlayer.MakeScope.Self)]"
# dbo_destiny_talented_youngest_heir_selection
 dbo_destiny_talented_youngest_heir_selection: "En Genç ve Tam Yetenek Esası"
 dbo_destiny_talented_youngest_heir_selection_desc: "Kıdem maziye hürmettir, liyakat ise istikbale hükmetmektir; bu sebeple devletin bekâsı, hanedanın en yaşlısı yerine kılıcı en keskin, zihni en berrak ve enerjisi en yüksek olan en genç şehzadenin iradesine emanet edilmelidir. Gençlik, işlenmeyi bekleyen en kıymetli cevher; liyakat ise cihan hâkimiyeti ülkümüzün yegâne anahtarıdır. İhtiyar heyetlerin sükûneti yerine genç fatihlerin sarsılmaz azminin esas alındığı bu nizam, imparatorluğun asırlar boyu sürecek olan ihtişamının en büyük teminatı olacaktır."
 dbo_destiny_talented_youngest_heir_selection_can_end_tt: "[ShowHeirSelectionName('dbo_destiny_talented_youngest_heir_selection')|e] [Concept('heir_selection', 'Veliaht Seçimi')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_talented_youngest_heir_selection_check', SituationView.GetPlayer.MakeScope.Self)]"
# dbo_destiny_legal_code_kanunname_i_al_i_osman_policy
 dbo_destiny_legal_code_kanunname_i_al_i_osman_policy: "Kanunname-i Âl-i Osman"
 dbo_destiny_legal_code_kanunname_i_al_i_osman_policy_desc: "Fatih Sultan Mehmed Han tarafından tedvin edilen bu kanunname, devletin bekâsı ve nizam-ı âlem için örfi hukuku yazılı hale getiren muazzam bir hukuk abidesidir. 'Kardeş Katli' meselesinden teşrifat usullerine, devlet görevlilerinin yetkilerinden ceza hukukuna kadar geniş bir yelpazeyi kapsayan bu yasalar, Osmanlı devlet yapısını merkeziyetçi bir mutlakiyet temeline oturtmuştur. Bu kanunlar, imparatorluğun sadece kılıçla değil, aynı zamanda sarsılmaz bir adalet ve nizam anlayışıyla yönetilmesini sağlayarak asırlar sürecek olan idari istikrarın kapılarını aralamıştır."
 dbo_destiny_legal_code_kanunname_i_al_i_osman_policy_developed: "$dbo_destiny_legal_code_kanunname_i_al_i_osman_policy$ geliştirildi"
 dbo_destiny_legal_code_kanunname_i_al_i_osman_policy_developed_tt: "Kanûnî Sultan Süleyman, devletin idari ve hukuki yapısını mükemmelleştirdi!"
# dbo_destiny_tengri_children
 dbo_destiny_children_of_tengri: "Tengri'nin Çocukları"
 dbo_destiny_children_of_tengri_desc: "Bozkırın kadim ruhu ve göklerin kutsal iradesi, Osmanlı'nın damarlarında akan asil kanda yaşamaya devam ediyor. Atalarımızdan miras kalan bu sarsılmaz irade, sadece bir inanç değil, aynı zamanda bir yaşam biçimi ve fetih ruhudur. Tengri'nin çocukları olarak, bozkırın disiplinini ve gökyüzünün sonsuzluğunu devletimizin temellerine nakşediyoruz. Bu kadim miras, ordularımıza cesaret, hükümdarlarımıza bilgelik ve halkımıza birlik ruhu aşılayarak, imparatorluğumuzu cihanın dört bir yanına taşıyacak olan en büyük tinsel güçtür."
# dbo_destiny_wing_of_turk
 dbo_destiny_wing_of_turk: "Türk'ün Kanadı"
 dbo_destiny_wing_of_turk_desc: "Atlar her zaman Türklerin en sadık dostları ve savaş arkadaşları olmuştur. Türk'ün Kanadı, Gök Türk ordusunun gökyüzünde süzülen güçlü ve çevik atlarının simgesidir. Bu kanat, sadece bir sembol değil, aynı zamanda Türklerin savaş stratejilerinde atların oynadığı kritik rolün de bir ifadesidir. Atların gücü ve hızı, Türk ordusunun düşmanlarına karşı üstünlük sağlamasına yardımcı olmuş ve imparatorluğun genişlemesinde hayati bir faktör olmuştur."
# dbo_destiny_believe_in_tengri_policy
 dbo_destiny_believe_in_tengri_policy: "Tengri'ye İnanmak"
 dbo_destiny_believe_in_tengri_policy_desc: "Tengri'ye inanmak, Türklerin sadece bir inanç sistemine değil, aynı zamanda bir yaşam felsefesine de sahip olmalarını sağlamıştır. Tengri inancı, Türklerin doğayla uyum içinde yaşama, atalara saygı gösterme ve gökyüzünün kutsal iradesine boyun eğme anlayışını şekillendirmiştir. Bu inanç, Türk'lerin savaş stratejilerinden günlük yaşamlarına kadar her alanda etkili olmuş ve imparatorluğun kültürel zenginliğinin temel taşlarından biri olmuştur."
 dbo_destiny_clergy_privilege_mevlana_dergahi: "Mevlâna Dergâhı"
 dbo_destiny_clergy_privilege_mevlana_dergahi_desc: "Mevlânâ Celâleddîn-i Rûmî tarafından kurulan bu dergâh, sadece bir tasavvuf merkezi değil, aynı zamanda Anadolu kültürünün ve sanatının da önemli bir parçasıdır. Mevlânâ'nın öğretileri, sevgi, hoşgörü ve insanlık değerlerini vurgulayarak, Türk toplumunun sosyal dokusunu şekillendirmiştir. Bu dergâh, Anadolu'nun kültürel çeşitliliğini ve hoşgörüsünü simgeleyen bir merkez olarak, kültürel mirasının en parlak örneklerinden biri olmuştur."
 dbo_destiny_clergy_privilege_mevlana_dergahi_can_end_tt: "[ShowEstatePrivilegeName('dbo_destiny_clergy_privilege_mevlana_dergahi')] [Concept('estate_privilege', 'Zümre Ayrıcalığı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_clergy_privilege_mevlana_dergahi_check', SituationView.GetPlayer.MakeScope.Self)]"
# dbo_destiny_nobles_privilege_pashas
 dbo_destiny_nobles_privilege_pashas: "Paşalar"
 dbo_destiny_nobles_privilege_pashas_desc: "Paşalar, Devlet-i Aliyye'nin idari ve askeri yapısında önemli bir rol oynayan yüksek rütbeli devlet görevlileridir. Paşalar, genellikle vali, beylerbeyi veya vezir gibi önemli pozisyonlarda görev yaparlar ve devletin farklı bölgelerinde yönetim ve askeri liderlik sağlarlar. Devlet-i Aliyye'nin geniş topraklarını etkili bir şekilde yönetmesine yardımcı olmuş ve uzun ömürlü olmasına katkıda bulunmuşlardır.\n\n[ShowBuildingTypeName('dbo_beylerbeyi')|e] [Concept('building', 'Yapısını')] inşa edebiliriz."
 dbo_destiny_nobles_privilege_pashas_can_end_tt: "[ShowEstatePrivilegeName('dbo_destiny_nobles_privilege_pashas')] [Concept('estate_privilege', 'Zümre Ayrıcalığı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_nobles_privilege_pashas_check', SituationView.GetPlayer.MakeScope.Self)]"
 # dbo_destiny_burghers_privilege_trade_center_grand_bazaar
 dbo_destiny_burghers_privilege_trade_center_grand_bazaar: "Ticaret Merkezi Kapalıçarşı"
 dbo_destiny_burghers_privilege_trade_center_grand_bazaar_desc: "Devletimizin kalbinde, ticaretin ve zenginliğin merkezi olacak muazzam bir pazar. Kapalıçarşı, sadece devletimiz değil, tüm dünyanın dikkatini çekecek bir ticaret merkezi olacak. Tüccarlar, zanaatkarlar ve sanatçılar burada toplanacak, mallarını sergileyecek ve devletimizin refahını artıracaklar. Bu büyük projeyi destekleyerek, devletin ekonomik gücünü ve kültürel çeşitliliğini tüm dünyaya göstereceğiz."
 dbo_destiny_burghers_privilege_trade_center_grand_bazaar_can_end_tt: "[ShowEstatePrivilegeName('dbo_destiny_burghers_privilege_trade_center_grand_bazaar')] [Concept('estate_privilege', 'Zümre Ayrıcalığı')|e];\n[ShowTriggerConditionsForScope('dbo_destiny_burghers_privilege_trade_center_grand_bazaar_check', SituationView.GetPlayer.MakeScope.Self)]"