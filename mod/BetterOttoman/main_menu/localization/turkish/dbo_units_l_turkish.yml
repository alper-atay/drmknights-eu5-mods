 dbo_metehans_cavalry_desc: "Metehan'ın Süvarileri, düşman hatlarını hızla yararak geçmek ve ardından arkadan saldırmak için eğitilmiş hızlı hareket eden birimlerden oluşur. Onların çevikliği ve savaş becerileri, düşman savunmalarını zayıflatmak ve savaşın gidişatını değiştirmek için kritik öneme sahiptir."
