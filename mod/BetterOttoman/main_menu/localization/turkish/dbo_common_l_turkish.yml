l_turkish:
 dbo_prince: "Şehzade"
 dbo_prince_die_desc: "Vefatı derin bir acı yaratan Şehzade [CHARACTER.GetName], genç yaşta hayatını kaybetti. Şehzade, devletin gelecekteki lideri olarak büyük umutlar vaat ediyordu. Onun ölümü, sarayda ve halk arasında büyük bir üzüntüye neden oldu."
 desc_dbo_prince: "Şehzade, devletin gelecekteki padişahı olacak olan genç hükümdardır. Şehzade, padişahın oğludur ve genellikle sarayda yetiştirilir. Şehzade, gelecekteki lider olarak eğitilir ve devlet işlerine hazırlanır."
 dbo_sultan: "Padişah"
 dbo_sultan_die_desc: "Padişah [CHARACTER.GetName], uzun ve başarılı bir hükümdarlığın ardından vefat etti. Padişah, devletin en yüksek makamında bulunuyordu ve onun ölümü, devletin geleceği için büyük bir kayıp olarak kabul edildi. Padişahın vefatı, sarayda ve halk arasında derin bir üzüntüye neden oldu."
 desc_dbo_sultan: "Padişah, Osmanlı İmparatorluğu'nun en yüksek makamıdır. Padişah, devletin başı ve en güçlü figürüdür. Padişah, ülkeyi yönetir, yasaları yapar ve ordunun başkomutanıdır."
 dbo_genius_artist: "Dahi Sanatçı"
 dbo_genius_artist_die_desc: "Dahi sanatçı [CHARACTER.GetName], beklenmedik bir şekilde hayatını kaybetti. Dahi sanatçı, olağanüstü yetenekleriyle tanınıyordu ve onun ölümü, sanat dünyasında büyük bir kayıp olarak kabul edildi. Dahi sanatçının vefatı, sanatseverler arasında derin bir üzüntüye neden oldu."
 desc_dbo_genius_artist: "Dahi sanatçı, olağanüstü yeteneklere sahip bir sanatçıdır. Dahi sanatçı, sanat dünyasında büyük bir saygı görür ve eserleriyle tanınır. Dahi sanatçı, genellikle resim, heykel veya diğer sanat formlarında ustalaşmıştır."
 dbo_cursed: "Lanetli"
 dbo_cursed_die_desc: "Lanetli [CHARACTER.GetName] devlete büyük bir zarar verdi ve sonunda trajik bir şekilde hayatını kaybetti. Lanetli, kötü şans ve talihsizlikle ilişkilendirilen bir karakterdi ve onun ölümü, devletin geleceği için büyük bir ferahlık olarak görüldü. Lanetli'nin vefatı, sarayda ve halk arasında karışık duygulara neden oldu."
 desc_dbo_cursed: "Lanetli, kötü şans ve talihsizlikle ilişkilendirilen bir karakterdir. Lanetli, genellikle kötü olayların merkezinde bulunur ve onun varlığı, devletin geleceği için bir tehdit olarak görülür."
 dbo_crown_noble_marry: "Soylu bir Hanımefendiyle Evlendir"
 dbo_crown_noble_marry_concept: "[marriage|E]"
 dbo_crown_noble_marry_act: "$dbo_crown_noble_marry$"
 dbo_crown_noble_marry_desc_specific: "[SCOPE.sCharacter('recipient').GetName], soylu bir hanımefendiyle evlenecek."
 dbo_crown_noble_marry_desc: "[character|e], soylu bir hanımefendiyle evlenecek."
 dbo_crown_noble_marry_past: "[SCOPE.sCharacter('recipient').GetName] [SCOPE.sCharacter('recipient').GetHerselfHimself] evlendi!"
 dbo_crown_noble_marry_act_past: "[SCOPE.sCharacter('recipient').GetName], soylu bir hanımefendiyle evlendi!"
 dbo_crown_noble_marry_tt: "Bu karakter, soylu bir hanımefendiyle evlenecek."