# dbo_history_fatih_sultan_mehmed_topkapi_palace
 dbo_dhe_sultans_fatih_sultan_mehmed.21.title: "[ShowBuildingTypeName('dbo_topkapi_palace')]"
 dbo_dhe_sultans_fatih_sultan_mehmed.21.desc: "[GetCharacter('dbo_fatih_sultan_mehmed').GetName], İstanbul'un fethinden sonra, şehrin yeni başkenti olarak seçilen [ShowBuildingTypeName('dbo_topkapi_palace')] inşa ettirdi. Bu saray, sadece bir hükümet merkezi değil, imparatorluğun kalbi olarak, Osmanlı'nın siyasi gücünü temsil eder."
 dbo_dhe_sultans_fatih_sultan_mehmed.21.a: "İnşaat Başlasın!"
# dbo_history_fatih_sultan_mehmed_sahni_seman_madrasa
 dbo_dhe_sultans_fatih_sultan_mehmed.22.title: "[ShowBuildingTypeName('dbo_sahni_seman_madrasa')]"
 dbo_dhe_sultans_fatih_sultan_mehmed.22.desc: "[GetCharacter('dbo_fatih_sultan_mehmed').GetName], İstanbul'un fethinden sonra, şehrin kültürel ve dini hayatını canlandırmak amacıyla [ShowBuildingTypeName('dbo_sahni_seman_madrasa')] [Concept('building', 'Yapısını')|e] inşa ettirdi. Bu medrese, sadece bir eğitim kurumu değil, aynı zamanda Osmanlı'nın yeni başkentinde İslam bilginlerinin yetiştiği bir kültür merkezi haline geldi. Fatih, bu yapıyla İstanbul'u sadece askeri bir güç değil, aynı zamanda entelektüel bir merkez haline getirme vizyonunu somutlaştırmıştır. Medrese, klasik İslam mimarisinin zarif örneklerinden biri olarak, Osmanlı'nın kültürel zenginliğini ve eğitim konusundaki kararlılığını simgeler. Bugün hala ayakta duran Sahni Seman Medresesi, Fatih Sultan Mehmed'in sadece bir fatih değil, aynı zamanda bir kültür ve eğitim hamisi olduğunu gösteren önemli bir miras olarak varlığını sürdürmektedir."
 dbo_dhe_sultans_fatih_sultan_mehmed.22.a: "İnşaat Başlasın!"
# dbo_fatih_sultan_mehmed Legal Code Kanunname-i Âl-i Osman
 dbo_dhe_sultans_fatih_sultan_mehmed.23.title: "[ShowPolicyName('dbo_destiny_legal_code_kanunname_i_al_i_osman_policy')]\n[Concept('policy', 'Politikası')|e]"
 dbo_dhe_sultans_fatih_sultan_mehmed.23.desc: "[GetCharacter('dbo_fatih_sultan_mehmed').GetName], devletin bekası ve merkezi otoritenin güçlendirilmesi amacıyla Osmanlı hukuk sistemini sistematik bir yapıya kavuşturan [ShowPolicyName('dbo_destiny_legal_code_kanunname_i_al_i_osman_policy')] [Concept('policy', 'Politikası')|e] yürürlüğe koydu. Bu kanunname ile devlet teşkilatı, protokol kuralları ve veraset sistemi hukuki bir zemine oturtuldu."
 dbo_dhe_sultans_fatih_sultan_mehmed.23.historical_info: "[ShowPolicyName('dbo_destiny_legal_code_kanunname_i_al_i_osman_policy')] [Concept('policy', 'Politikası')|e], Osmanlı Devleti'nin örfi hukukunu yazılı hale getiren ilk büyük kanun külliyatıdır. Fatih, bu düzenleme ile 'Nizam-ı Alem' (dünya düzeni) için kardeş katline izin vermiş, devletin bölünmez bütünlüğünü her şeyin üstünde tutmuştur. Ayrıca sadrazamlık makamının yetkilerini artırarak ve saray hiyerarşisini belirleyerek, Osmanlı'yı bir kabile devletinden cihanşümul bir imparatorluğa dönüştüren idari temelleri atmıştır."
 dbo_dhe_sultans_fatih_sultan_mehmed.23.a: "Devletin Temeli Sağlamlaşıyor!"
# dbo_history_fatih_sultan_mehmed_retire
 dbo_dhe_sultans_fatih_sultan_mehmed.31.title: "[GetCharacter('dbo_fatih_sultan_mehmed').GetName]\nEmeklilik Kararı"
 dbo_dhe_sultans_fatih_sultan_mehmed.31.desc: "Fatih Sultan Mehmed, uzun ve başarılı bir saltanatın ardından, devlet işlerini genç ve enerjik bir varise devretmeye karar verdi. Emeklilik kararı, Osmanlı tarihinde nadir görülen bir durumdur ve onun vizyoner liderliğinin bir göstergesidir."
 dbo_dhe_sultans_fatih_sultan_mehmed.31.a: "Emeklilik Hayatı Başlasın!"
 dbo_dhe_sultans_fatih_sultan_mehmed.31.b: "Hayır Hükmetmeye Devam Etmeliyim!"
# dbo_fatih_sultan_mehmed Die
 dbo_dhe_sultans_fatih_sultan_mehmed.32.title: "[GetCharacter('dbo_fatih_sultan_mehmed').GetName]'in Vefatı"
 dbo_dhe_sultans_fatih_sultan_mehmed.32.desc: "'Ebu'l-Feth' (Fetihlerin Babası) [GetCharacter('dbo_fatih_sultan_mehmed').GetName] hayata gözlerini yumdu. Ölümü, hem Doğu'da hem Batı'da büyük bir yankı uyandırdı."
 dbo_dhe_sultans_fatih_sultan_mehmed.32.historical_info: "3 Mayıs 1481'de, yeni bir sefere çıkmak üzereyken Gebze yakınlarındaki Hünkar Çayırı'nda 'Ebu'l-Feth' (Fetihlerin Babası) [GetCharacter('dbo_fatih_sultan_mehmed').GetName] hayata gözlerini yumdu. Ölümü, hem Doğu'da hem Batı'da büyük bir yankı uyandırdı. Fatih'in ölümüyle Avrupa'da kiliseler çan çalarak 'Büyük Kartal Öldü!' nidalarıyla kutlamalar yapmış olsa da, o geride sarsılmaz bir imparatorluk, modern bir ordu ve köklü bir idari yapı bırakmıştır. Naaşı, kendi yaptırdığı Fatih Camii'ndeki türbesine defnedilmiştir."
 dbo_dhe_sultans_fatih_sultan_mehmed.32.a: "$dbo_history_common_die_option$"
# dbo_yavuz_sultan_selim
 dbo_yavuz_sultan_selim_historical_info_common: "[GetCharacter('dbo_yavuz_sultan_selim').GetName], Osmanlı İmparatorluğu'nun dokuzuncu padişahı ve ilk Osmanlı halifesidir. 'Yavuz' lakabını sert mizacı, sarsılmaz iradesi ve askeri dehasıyla kazanan Selim Han, sekiz yıl gibi kısa bir sürede imparatorluk topraklarını iki buçuk katına çıkararak cihanşümul bir güç haline getirmiştir. Babası II. Bayezid'den devraldığı devleti, rotasını Doğu'ya çevirerek Safevi tehdidine karşı Çaldıran'da mutlak bir zaferle korumuş; ardından Mercidabık ve Ridaniye muharebeleriyle Memlük Devleti'ne son vererek Suriye, Filistin, Hicaz ve Mısır'ı Osmanlı mülküne katmıştır. Kutsal toprakların anahtarlarını teslim aldığında kendisini 'Hâkimü'l-Haremeyn' (Kutsal Yerlerin Hakimi) yerine 'Hâdimü'l-Haremeyn' (Kutsal Yerlerin Hizmetkarı) olarak tanımlayan Yavuz, halifelik makamını Osmanlı hanedanına taşıyarak İslam dünyasının liderliğini perçinlemiştir. Hazinesini ağzına kadar dolduran ve 'Benim altınla doldurduğum hazineyi, torunlarımdan her kim doldurabilirse kendi mührüyle mühürlesin, aksi halde benim mührümle mühürlenmeye devam etsin' vasiyetiyle Osmanlı'nın ekonomik zirvesini simgeleyen Selim Han, kısa saltanatına asırları sığdıran bir hakan olarak tarihe geçmiştir."
# dbo_yavuz_sultan_selim Born
 dbo_dhe_sultans_yavuz_sultan_selim.1.title: "[GetCharacter('dbo_yavuz_sultan_selim').GetName]'in\n$dbo_history_common_born$"
 dbo_dhe_sultans_yavuz_sultan_selim.1.desc: "1470 yılında Amasya'da, Osmanlı tarihinin en sert ve kararlı hükümdarlarından biri olacak olan Şehzade Selim dünyaya geldi. Babası II. Bayezid'in döneminde yetişen Selim, genç yaşlarından itibaren askeri yeteneği ve devlet yönetimine olan ilgisiyle dikkatleri üzerine çekti."
 dbo_dhe_sultans_yavuz_sultan_selim.1.historical_info: "[GetCharacter('dbo_yavuz_sultan_selim').GetName], Osmanlı İmparatorluğu'nun 9. padişahı ve 88. İslam halifesidir. 'Yavuz' lakabını kararlılığı, cesareti ve sert mizacı sayesinde almıştır. Hükümdarlığı süresince rotasını Doğu'ya çevirerek Safevi ve Memlük tehlikelerini bertaraf etmiş, imparatorluk topraklarını sekiz yıl gibi kısa bir sürede iki buçuk katına çıkararak Osmanlı'yı İslam dünyasının lideri konumuna taşımıştır.\n\n$dbo_yavuz_sultan_selim_historical_info_common$"
 dbo_dhe_sultans_yavuz_sultan_selim.1.a: "Yavuz Bir Aslan Doğdu!"
# dbo_yavuz_sultan_selim Ascend
 dbo_dhe_sultans_yavuz_sultan_selim.2.title: "[GetCharacter('dbo_yavuz_sultan_selim').GetName]'in Yükselişi"
 dbo_dhe_sultans_yavuz_sultan_selim.2.desc: "[GetCharacter('dbo_yavuz_sultan_selim').GetName] büyüyor ve devlet idaresindeki keskin zekası ile askeri dehası tüm Osmanlı mülkünde yankılanmaya başlıyor. Şehzade Selim'in kararlılığı, dostun güveni düşmanın ise korkusu haline geliyor!"
 dbo_dhe_sultans_yavuz_sultan_selim.2.historical_info: "Trabzon sancakbeyliği döneminde Safevi tehlikesini yerinde gözlemleyen ve devletin bekası için sert tedbirler alınması gerektiğini savunan Selim, askeri yeteneklerini bu dönemde kanıtlamıştır. Yeniçerilerin desteğini arkasına alarak babası II. Bayezid'den tahtı devralan Yavuz, kısa sürede tüm imparatorluğa kendi otoritesini kabul ettirmiştir.\n\n$dbo_yavuz_sultan_selim_historical_info_common$"
 dbo_dhe_sultans_yavuz_sultan_selim.2.a: "$dbo_history_common_rise_option$"
# dbo_yavuz_sultan_selim Rise
 dbo_dhe_sultans_yavuz_sultan_selim.3.title: "[GetCharacter('dbo_yavuz_sultan_selim').GetName] Tahta Çıktı"
 dbo_dhe_sultans_yavuz_sultan_selim.3.desc: "1512 yılında, Yeniçerilerin tam desteğini alan [GetCharacter('dbo_yavuz_sultan_selim').GetName], babası II. Bayezid'in feragatiyle Osmanlı tahtına oturdu. 'Yavuz' lakabıyla anılacak olan yeni padişah, devletin bekası için en sert kararları almaktan çekinmeyeceğini ve rotasını doğrudan Doğu'daki tehditlere çevireceğini tüm dünyaya ilan etti."
 dbo_dhe_sultans_yavuz_sultan_selim.3.historical_info: "Yavuz Sultan Selim, Osmanlı tarihinde babasını tahttan indirerek başa geçen ilk padişahtır. Tahta çıkar çıkmaz devletin merkezi otoritesini sarsan iç karışıklıkları bastırmış ve Safevi Devleti'nin Anadolu üzerindeki etkisini kırmak için büyük bir hazırlığa girişmiştir. Onun saltanatı, Osmanlı'nın bir dünya gücü haline gelmesindeki en kritik eşiklerden biridir.\n\n$dbo_yavuz_sultan_selim_historical_info_common$"
 dbo_dhe_sultans_yavuz_sultan_selim.3.a: "$dbo_history_common_ascend_option$"
# dbo_history_yavuz_sultan_selim_die
 dbo_dhe_sultans_yavuz_sultan_selim.11.title: "[GetCharacter('dbo_yavuz_sultan_selim').GetName]\n$dbo_history_common_die$"
 dbo_dhe_sultans_yavuz_sultan_selim.11.desc: "Sekiz yıla seksen yıllık iş sığdıran [GetCharacter('dbo_yavuz_sultan_selim').GetName], Batı'ya yapacağı büyük seferin hazırlıkları içindeyken 'Sirpençe' adı verilen bir çıban yüzünden hayata gözlerini yumdu."
 dbo_dhe_sultans_yavuz_sultan_selim.11.historical_info: "22 Eylül 1520'de vefat eden Yavuz Sultan Selim, Osmanlı Devleti'ni bir dünya gücü ve İslam dünyasının lideri olarak oğlu Süleyman'a devretmiştir. Hazinesini ağzına kadar doldurmuş, Safevi ve Memlük tehditlerini tamamen ortadan kaldırmıştır. Naaşı, İstanbul'da kendi adına yaptırılan Yavuz Selim Camii'ndeki türbesine defnedilmiştir."
 dbo_dhe_sultans_yavuz_sultan_selim.11.a: "$dbo_history_common_die_option$"
# dbo_kanuni_sultan_suleiman born
 dbo_dhe_sultans_kanuni_sultan_suleiman.1.title: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName]'in\n$dbo_history_common_born$"
 dbo_dhe_sultans_kanuni_sultan_suleiman.1.desc: "1494 yılında Trabzon'da, cihanın 'Muhteşem' olarak tanıyacağı, adaletiyle 'Kanuni' unvanını alacak olan Şehzade Süleyman dünyaya geldi. Babası [GetCharacter('dbo_yavuz_sultan_selim').GetName]'in sert ve disiplinli yönetiminde yetişen Süleyman, Osmanlı'nın en parlak döneminin mimarı olacaktır."
 dbo_dhe_sultans_kanuni_sultan_suleiman.1.historical_info: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName], Osmanlı İmparatorluğu'nun onuncu padişahı ve en uzun süre tahtta kalan hükümdarıdır. Batı'da 'Muhteşem', Doğu'da ise devlet yapısını hukuki temellere oturtması nedeniyle 'Kanuni' olarak anılır. Saltanatı boyunca imparatorluk hem askeri hem de kültürel ve ekonomik olarak zirve noktasına ulaşmıştır."
 dbo_dhe_sultans_kanuni_sultan_suleiman.1.a: "Cihan'a Muhteşem Bir Yıldız Doğdu!"
# dbo_kanuni_sultan_suleiman rise
 dbo_dhe_sultans_kanuni_sultan_suleiman.2.title: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName]'in Yükselişi"
 dbo_dhe_sultans_kanuni_sultan_suleiman.2.desc: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName], [GetCharacter('dbo_kanuni_sultan_suleiman').GetAgeInYears] yaşına geldi ve artık Devlet-i Aliyye'nin başına geçecektir! Hiç bir güç engelleyemez."
 dbo_dhe_sultans_kanuni_sultan_suleiman.2.historical_info: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName], Manisa sancakbeyliği döneminde devlet idaresini ve askeri stratejileri bizzat tecrübe ederek tahta hazırlanmıştır. Babası Yavuz Sultan Selim'in vefatıyla rakipsiz bir şekilde tahta çıkan Süleyman, saltanatının ilk yıllarında Belgrad ve Rodos gibi stratejik noktaları fethederek Avrupa'nın içlerine doğru uzanacak olan muazzam fetihlerin işaretini vermiştir."
 dbo_dhe_sultans_kanuni_sultan_suleiman.2.a: "$dbo_history_common_rise_option$"
# dbo_kanuni_sultan_suleiman ascend
 dbo_dhe_sultans_kanuni_sultan_suleiman.3.title: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName]'in\n$dbo_history_common_ascend$"
 dbo_dhe_sultans_kanuni_sultan_suleiman.3.desc: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName], [GetCharacter('dbo_kanuni_sultan_suleiman').GetAgeInYears] yaşına geldi ve artık Devlet-i Aliyye'nin başına geçecektir! Hiç bir güç engelleyemez."
 dbo_dhe_sultans_kanuni_sultan_suleiman.3.historical_info: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName], 1520 yılında babası Yavuz Sultan Selim'in vefatı üzerine Osmanlı tahtına rakipsiz bir şekilde oturmuştur. Saltanatının ilk yıllarında Belgrad ve Rodos'u fethederek Avrupa'ya Osmanlı'nın yeni gücünü ilan etmiş, adaleti ve kanunlarıyla imparatorluğun altın çağını başlatmıştır."
 dbo_dhe_sultans_kanuni_sultan_suleiman.3.a: "$dbo_history_common_ascend_option$"
# dbo_history_kanuni_sultan_suleiman lawcode_of_suleiman
 dbo_dhe_sultans_kanuni_sultan_suleiman.11.title: "[ShowPolicyName('dbo_destiny_legal_code_kanunname_i_al_i_osman_policy')]\n[Concept('policy', 'Politikası')|e]"
 dbo_dhe_sultans_kanuni_sultan_suleiman.11.desc: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName], devletin idari ve hukuki yapısını mükemmelleştirmek adına, mevcut tüm kanunları gözden geçirerek var olan [ShowPolicyName('dbo_destiny_legal_code_kanunname_i_al_i_osman_policy')] [Concept('policy', 'Politikasını')|e] geliştirip, güncelleyip ilan etti. Bu düzenleme, imparatorluğun her köşesinde adaletin eşit şekilde tecelli etmesini hedeflemektedir."
 dbo_dhe_sultans_kanuni_sultan_suleiman.11.historical_info: "Kanuni Sultan Süleyman, saltanatı boyunca yayınladığı fermanlarla Osmanlı hukuk sistemini zirveye taşımıştır. Şeyhülislam Ebussuud Efendi ile birlikte hazırlanan bu kanunlar, sadece ceza ve vergi hukukunu değil, toprak yönetiminden sosyal hayata kadar her alanı düzenlemiştir. Bu hukuki istikrar sayesinde 'Kanuni' unvanını almış ve Osmanlı Devleti'nin 'Altın Çağı' kurumsal bir kimlik kazanmıştır."
 dbo_dhe_sultans_kanuni_sultan_suleiman.11.a: "Kanuni'nin Adaleti Her Yerde Hüküm Sürüyor!"
# dbo_history_kanuni_sultan_suleiman_killing_heir
 dbo_dhe_sultans_kanuni_sultan_suleiman.21.title: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName]\nVeliahtını Kaybetti"
 dbo_dhe_sultans_kanuni_sultan_suleiman.21.desc: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName], en büyük oğlu ve veliahtı [ROOT.GetCountry.GetGovernment.GetHeir.GetName], saray entrikaları sonucu öldürülmesiyle büyük bir acı yaşadı. Bu olay, hem aile içinde derin yaralar açtı hem de devlet yönetiminde ciddi sarsıntılara neden oldu."
 dbo_dhe_sultans_kanuni_sultan_suleiman.21.historical_info: "1553 yılında, Kanuni Sultan Süleyman'ın en büyük oğlu ve veliahtı Şehzade Mustafa, saray entrikaları sonucu öldürüldü. Bu trajik olay, hem aile içinde derin yaralar açtı hem de devlet yönetiminde ciddi sarsıntılara neden oldu. Mustafa'nın ölümüyle birlikte, Kanuni'nin diğer oğulları arasında taht mücadelesi başladı ve bu durum Osmanlı'nın geleceği üzerinde uzun süreli etkiler bıraktı."
 dbo_dhe_sultans_kanuni_sultan_suleiman.21.a: "[ROOT.GetCountry.GetGovernment.GetHeir.GetName] Ölmeli!"
# dbo_history_yavuz_sultan_selim_die
 dbo_dhe_sultans_kanuni_sultan_suleiman.31.title: "[GetCharacter('dbo_kanuni_sultan_suleiman').GetName]\n$dbo_history_common_die$"
 dbo_dhe_sultans_kanuni_sultan_suleiman.31.desc: "1566 yılında, uzun ve görkemli bir saltanatın ardından, 'Muhteşem' [GetCharacter('dbo_kanuni_sultan_suleiman').GetName] hayatını kaybetti. Ölümü, Osmanlı İmparatorluğu'nda büyük bir yas havası oluşturdu."
 dbo_dhe_sultans_kanuni_sultan_suleiman.31.historical_info: "6 Eylül 1566'da, Zigetvar Seferi sırasında, 'Muhteşem' [GetCharacter('dbo_kanuni_sultan_suleiman').GetName] hayatını kaybetti. Ölümü, Osmanlı İmparatorluğu'nda büyük bir yas havası oluşturdu. Kanuni'nin naaşı, İstanbul'a getirildikten sonra kendi yaptırdığı Süleymaniye Camii'ndeki türbesine defnedilmiştir."
 dbo_dhe_sultans_kanuni_sultan_suleiman.31.a: "$dbo_history_common_die_option$" 